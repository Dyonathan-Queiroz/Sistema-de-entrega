{% extends 'entregas/base.html' %}

{% block content %}
<div class="container-fluid">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card card-info card-outline shadow">
                <div class="card-header">
                    <h3 class="card-title">
                        <i class="fas fa-edit mr-2"></i>Editar Filial: <strong>{{ filial.nome }}</strong>
                    </h3>
                </div>
                
                <form method="post">
                    {% csrf_token %}
                    <div class="card-body">
                        <div class="form-group">
                            <label for="id_nome">Nome da Unidade</label>
                            {{ form.nome }}
                        </div>
                        <div class="form-group">
                            <label for="id_cidade">Cidade</label>
                            {{ form.cidade }}
                        </div>
                    </div>
                    
                    <div class="card-footer">
                        <button type="submit" class="btn btn-info font-weight-bold">
                            <i class="fas fa-check mr-1"></i> Salvar Alterações
                        </button>
                        <a href="{% url 'gerenciar_filiais' %}" class="btn btn-default float-right">
                            Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
