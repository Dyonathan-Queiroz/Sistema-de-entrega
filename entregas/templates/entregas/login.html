<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sistema Entregas | Login</title>

    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,400i,700&display=fallback">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css">

    <style>
        /* Fundo com gradiente profundo e moderno */
        body.login-page {
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%) !important;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        .login-box {
            width: 420px;
        }

        .card {
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: #ffffff;
        }

        .login-logo a {
            color: #f8fafc !important;
            font-size: 2.2rem;
            letter-spacing: -1px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        .input-group {
            background-color: #f1f5f9;
            border-radius: 12px;
            padding: 2px 10px;
            border: 2px solid transparent;
            transition: all 0.3s ease;
        }

        .input-group:focus-within {
            border-color: #3b82f6;
            background-color: #fff;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        .form-control {
            background: transparent !important;
            border: none !important;
            box-shadow: none !important;
            height: 48px;
            color: #1e293b;
        }

        .btn-primary {
            background: linear-gradient(to right, #2563eb, #1d4ed8);
            border: none;
            border-radius: 12px;
            height: 52px;
            font-size: 1.1rem;
            font-weight: 600;
            margin-top: 10px;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(37, 99, 235, 0.3);
        }

        .login-box-msg {
            color: #64748b;
            font-size: 1rem;
        }
    </style>
</head>
<body class="hold-transition login-page">

<div class="login-box">
    <div class="login-logo mb-4 text-center">
        <a href="#"><b>Sistema</b> Entregas</a>
    </div>
    
    <div class="card card-outline card-primary">
        <div class="card-body login-card-body p-5">
            <p class="login-box-msg font-weight-bold">Seja bem-vindo de volta!</p>

            {% if form.errors %}
                <div class="alert alert-danger text-sm border-0 mb-4" style="border-radius: 10px;">
                    <i class="fas fa-exclamation-circle mr-2"></i> Usuário ou senha incorretos.
                </div>
            {% endif %}

            <form method="post">
                {% csrf_token %}
                
                <label class="small font-weight-bold text-dark ml-1">Usuário</label>
                <div class="input-group mb-3">
                    <input type="text" name="username" class="form-control" placeholder="Digite seu usuário" required>
                    <div class="input-group-append">
                        <div class="input-group-text">
                            <span class="fas fa-user-circle"></span>
                        </div>
                    </div>
                </div>

                <label class="small font-weight-bold text-dark ml-1">Senha</label>
                <div class="input-group mb-4">
                    <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                    <div class="input-group-append">
                        <div class="input-group-text">
                            <span class="fas fa-lock"></span>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-block">
                    Acessar conta
                </button>
            </form>

            <div class="mt-5 text-center">
                <p class="mb-1">
                    <a href="#" class="text-sm font-weight-bold text-primary">Esqueceu sua senha?</a>
                </p>
                <hr class="my-4">
                <p class="mb-0 text-muted small">
                    <i class="fas fa-shield-alt mr-1"></i> v1.0 — Suporte Técnico Queiroz
                </p>
            </div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>

</body>
</html>
